<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" aria-label="판사봉 아이콘">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3894e0"/><stop offset="1" stop-color="#10549e"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c79355"/><stop offset="1" stop-color="#7a4a1f"/>
    </linearGradient>
    <linearGradient id="wood2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0b478"/><stop offset="1" stop-color="#8a5a28"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0b3a5e" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 하늘색 라운드 배경 -->
  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#bg)"/>
  <ellipse cx="92" cy="64" rx="46" ry="20" fill="#ffffff" opacity="0.35"/>
  <ellipse cx="172" cy="48" rx="34" ry="15" fill="#ffffff" opacity="0.28"/>

  <g filter="url(#sh)">
    <!-- 사운드 블록(받침) -->
    <rect x="58" y="196" width="140" height="26" rx="13" fill="url(#wood)"/>
    <rect x="80" y="178" width="96" height="22" rx="11" fill="url(#wood2)"/>

    <!-- 손잡이 -->
    <g transform="rotate(40 128 120)">
      <rect x="118" y="96" width="22" height="118" rx="11" fill="url(#wood)"/>
      <rect x="122" y="100" width="6" height="110" rx="3" fill="#f0d3a3" opacity="0.5"/>
    </g>

    <!-- 머리 -->
    <g transform="rotate(40 128 92)">
      <rect x="62" y="62" width="132" height="58" rx="26" fill="url(#wood2)"/>
      <rect x="70" y="62" width="16" height="58" rx="8" fill="#6b4220" opacity="0.5"/>
      <rect x="170" y="62" width="16" height="58" rx="8" fill="#6b4220" opacity="0.5"/>
      <rect x="74" y="72" width="108" height="8" rx="4" fill="#fff" opacity="0.25"/>
    </g>
  </g>
</svg>
